services:
  first:
    build:
      context: ../../..
      dockerfile: machines/first/edge/Dockerfile
    image: ghcr.io/pudap/first-edge:latest
    container_name: first-edge
    restart: unless-stopped
    # Mount USB devices for serial communication and camera access
    # Note: Device paths should match QUBOT_PORT, SARTORIUS_PORT, and CAMERA_INDEX env vars
    devices:
      - ${QUBOT_PORT:-/dev/ttyACM0}:${QUBOT_PORT:-/dev/ttyACM0}  # Qubot port (set QUBOT_PORT env var to override)
      - ${SARTORIUS_PORT:-/dev/ttyUSB0}:${SARTORIUS_PORT:-/dev/ttyUSB0}  # Sartorius port (set SARTORIUS_PORT env var to override)
      - /dev/video${CAMERA_INDEX:-0}:/dev/video${CAMERA_INDEX:-0}  # Camera device (set CAMERA_INDEX env var to override)
    # Alternative: Use privileged mode if device mounting doesn't work
    # privileged: true
    # Mount workspace for development (optional - allows live code changes)
    # Uncomment these volumes to enable live code reloading during development
    # volumes:
    #   - ../../libs:/app/libs:ro
    #   - ./first.py:/app/machines/first/edge/first.py:ro
    # Environment variables for device configuration
    env_file:
      - .env  # Path relative to compose.yml location (machines/first/edge/.env)
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
